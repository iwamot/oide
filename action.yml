name: 'Oide by iwamot'
description: 'Pulls files listed in your Oidefile from a source repository.'

branding:
  icon: corner-left-down
  color: orange

inputs:
  source:
    description: 'Source repo in org/repo@ref format (ref can be tag, branch, or SHA)'
    required: true

runs:
  using: composite
  steps:
    - name: Run oide
      shell: bash
      env:
        SOURCE: ${{ inputs.source }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/scripts/oide.sh"

name: 'Oide by iwamot'
description: 'Pulls files listed in your Oidefile from a source repository.'

branding:
  icon: corner-left-down
  color: orange

inputs:
  source:
    description: 'Source repo in org/repo@ref format (ref can be tag, branch, or SHA)'
    required: true
  token:
    description: 'Token with contents:read access to source repo. Required only for private source repositories.'
    required: false
    default: ''

runs:
  using: node24
  main: dist/index.js

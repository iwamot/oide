name: Self-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: test
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Pull from public fixture (no token)
        env:
          INPUT_SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          echo "README.md" > "$workdir/Oidefile"
          GITHUB_WORKSPACE="$workdir" node dist/index.js
          test -f "$workdir/README.md"

      - name: Discover Oidefile under .github/
        env:
          INPUT_SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          mkdir -p "$workdir/.github"
          echo "README.md" > "$workdir/.github/Oidefile"
          GITHUB_WORKSPACE="$workdir" node dist/index.js
          test -f "$workdir/README.md"

      - name: Root Oidefile takes precedence over .github/
        env:
          INPUT_SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          mkdir -p "$workdir/.github"
          echo "README.md" > "$workdir/Oidefile"
          echo "__nonexistent__" > "$workdir/.github/Oidefile"
          GITHUB_WORKSPACE="$workdir" node dist/index.js
          test -f "$workdir/README.md"

      - name: Pull from private fixture (with token)
        if: github.event.pull_request.head.repo.fork != true
        env:
          INPUT_SOURCE: iwamot/oide-fixture-private@main
          INPUT_TOKEN: ${{ secrets.OIDE_FIXTURE_TOKEN }}
        run: |
          workdir=$(mktemp -d)
          echo "README.md" > "$workdir/Oidefile"
          GITHUB_WORKSPACE="$workdir" node dist/index.js
          test -f "$workdir/README.md"

      - name: Self-skip exits no-op when source equals github.repository
        env:
          INPUT_SOURCE: ${{ github.repository }}@main
        run: |
          output=$(node dist/index.js)
          echo "$output"
          if ! echo "$output" | grep -q "self-skip"; then
            echo "::error::self-skip notice not emitted"
            exit 1
          fi

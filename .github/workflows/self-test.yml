name: Self-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: test
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Pull from public fixture (no token)
        env:
          SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          echo "README.md" > "$workdir/Oidefile"
          GITHUB_WORKSPACE="$workdir" bash scripts/oide.sh
          test -f "$workdir/README.md"

      - name: Discover Oidefile under .github/
        env:
          SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          mkdir -p "$workdir/.github"
          echo "README.md" > "$workdir/.github/Oidefile"
          GITHUB_WORKSPACE="$workdir" bash scripts/oide.sh
          test -f "$workdir/README.md"

      - name: Root Oidefile takes precedence over .github/
        env:
          SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          mkdir -p "$workdir/.github"
          echo "README.md" > "$workdir/Oidefile"
          echo "__nonexistent__" > "$workdir/.github/Oidefile"
          GITHUB_WORKSPACE="$workdir" bash scripts/oide.sh
          test -f "$workdir/README.md"

      - name: Pull from private fixture (with token)
        if: github.event.pull_request.head.repo.fork != true
        env:
          SOURCE: iwamot/oide-fixture-private@main
          TOKEN: ${{ secrets.OIDE_FIXTURE_TOKEN }}
        run: |
          workdir=$(mktemp -d)
          echo "README.md" > "$workdir/Oidefile"
          GITHUB_WORKSPACE="$workdir" bash scripts/oide.sh
          test -f "$workdir/README.md"

      - name: Self-skip exits no-op when source equals github.repository
        env:
          SOURCE: ${{ github.repository }}@main
        run: |
          output=$(bash scripts/oide.sh)
          echo "$output"
          if ! echo "$output" | grep -q "self-skip"; then
            echo "::error::self-skip notice not emitted"
            exit 1
          fi

name: Self-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: test
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Pull from public fixture (no token)
        env:
          SOURCE: iwamot/oide-fixture-public@main
        run: |
          workdir=$(mktemp -d)
          echo "README.md" > "$workdir/Oidefile"
          GITHUB_WORKSPACE="$workdir" bash scripts/oide.sh
          test -f "$workdir/README.md"

      - name: Pull from private fixture (with token)
        if: github.event.pull_request.head.repo.fork != true
        env:
          SOURCE: iwamot/oide-fixture-private@main
          TOKEN: ${{ secrets.OIDE_FIXTURE_TOKEN }}
        run: |
          workdir=$(mktemp -d)
          echo "README.md" > "$workdir/Oidefile"
          GITHUB_WORKSPACE="$workdir" bash scripts/oide.sh
          test -f "$workdir/README.md"

      - name: Self-skip exits no-op when source equals github.repository
        env:
          SOURCE: ${{ github.repository }}@main
        run: |
          output=$(bash scripts/oide.sh)
          echo "$output"
          if ! echo "$output" | grep -q "self-skip"; then
            echo "::error::self-skip notice not emitted"
            exit 1
          fi

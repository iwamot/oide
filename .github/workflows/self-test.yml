name: Self-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Self-skip exits no-op when source equals github.repository
        env:
          SOURCE: ${{ github.repository }}@main
        run: |
          output=$(bash scripts/oide.sh)
          echo "$output"
          if ! echo "$output" | grep -q "self-skip"; then
            echo "::error::self-skip notice not emitted"
            exit 1
          fi
